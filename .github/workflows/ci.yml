name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      claude_version:
        description: Claude Code version to test (empty = latest).
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-Commit
    # The reusable diffs changed files against the PR base, so it only runs on
    # pull_request. Push / schedule invocations (cd.yml, release-watch.yml) have
    # no base_ref — skip rather than run hk over an empty diff range.
    if: github.event_name == 'pull_request'
    # use-pnpm defaults to false: this repo is node-free (the hk:base task pulls
    # gtb and the linters from mise), so hk runs without a pnpm install.
    uses: gtbuchanan/tooling/.github/workflows/pre-commit.yml@main

  unit:
    name: Unit Tests
    # The C launcher's logic is pure POSIX, so its unit tests build + run
    # natively via mise's zig in seconds — no Termux/Docker.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: gtbuchanan/tooling/.github/actions/mise-setup@main
      - run: mise run test:fast

  # Native arm64 runner (free for public repos) → the aarch64 container runs
  # without QEMU. Split into two jobs so a compile break and an install/behavior
  # break surface separately.
  compile:
    name: Compile
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: gtbuchanan/tooling/.github/actions/mise-setup@main
      - run: mise run compile
      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: deb
          path: artifacts/packages/*.deb
          if-no-files-found: error

  e2e:
    name: E2E Test
    needs: compile
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: gtbuchanan/tooling/.github/actions/mise-setup@main
      - name: Download the compiled .deb
        uses: actions/download-artifact@v8
        with:
          name: deb
          path: artifacts/packages
      - env:
          CLAUDE_CODE_VERSION: ${{ inputs.claude_version }}
        run: mise run test:e2e
